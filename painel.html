<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Oficial BrocheZap - 100% Fiel</title>
<style>
*{box-sizing:border-box;font-family:Arial}body{margin:0;background:#f5f0ff}
header{background:#6A2FB5;color:#fff;padding:14px;text-align:center;font-weight:900}
.card{background:#fff;margin:12px;padding:16px;border-radius:14px;border:1.5px solid #e9e0ff}
label{font-size:11px;font-weight:800;color:#6A2FB5;display:block;margin-top:10px}
input,textarea{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;margin-top:4px}
.btn{padding:14px;border:0;border-radius:10px;width:100%;font-weight:900;cursor:pointer;margin-top:8px}
.btn-roxo{background:#6A2FB5;color:#fff}.btn-verde{background:#00B894;color:#fff}.btn-cinza{background:#eee;color:#333}
.qr-box{border:2px dashed #6A2FB5;border-radius:12px;padding:12px;text-align:center;background:#faf8ff;margin-top:12px}
.cert-wrap{position:relative;text-align:center}
.cert-wrap img{width:100%;max-width:800px;border-radius:8px}
.cert-nome{position:absolute;top:47%;left:50%;transform:translate(-50%,-50%);font-family:'Brush Script MT',cursive;font-size:32px;color:#6A2FB5;white-space:nowrap}
.adesivo-wrap{position:relative;text-align:center}
.adesivo-wrap img{width:100%;max-width:800px;border-radius:8px}
.adesivo-qr{position:absolute;top:48%;right:12.5%;width:18%;transform:translateY(-50%)}
</style>
</head>
<body>
<header>✅ KIT OFICIAL FIEL - 4 ITENS OFICIAIS</header>

<div class="card">
<label>Nome da Empresa</label><input id="empresa" value="Nome da Empresa" oninput="gerar()">
<label>WhatsApp com 55</label><input id="numero" value="551881670564" oninput="gerar()">
<label>Mensagem</label><textarea id="msg" rows="2" oninput="gerar()">Olá! Estou neste estabelecimento e prefiro me comunicar por mensagem.</textarea>
<button class="btn btn-roxo" onclick="gerar()">GERAR KIT FIEL</button>
<div class="qr-box"><img id="qr" style="width:200px"><br><span id="linkTxt" style="font-size:8px;color:#777;word-break:break-all"></span><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-cinza" onclick="copiar()">Copiar Link</button><button class="btn btn-verde" onclick="baixarQR()">Baixar QR</button></div><button class="btn btn-cinza" onclick="window.print()">🖨️ IMPRIMIR QR CODE</button></div>
</div>

<div class="card"><h3 style="color:#6A2FB5;margin:0 0 8px 0">1. CERTIFICADO OFICIAL</h3><div class="cert-wrap" id="certWrap"><img id="certBase" src="certificado-base.png"><div id="certNome" class="cert-nome">Nome da Empresa</div></div><button class="btn btn-verde" onclick="baixarCert()">Baixar Certificado Fiel PNG</button></div>

<div class="card"><h3 style="color:#6A2FB5;margin:0 0 8px 0">2. SELO OFICIAL</h3><div style="text-align:center"><img src="selo-base.png" style="width:100%;max-width:400px"></div><button class="btn btn-cinza" onclick="window.open('selo-base.png','_blank')">Baixar Selo</button></div>

<div class="card"><h3 style="color:#6A2FB5;margin:0 0 8px 0">3. ADESIVO PORTA/BALCÃO</h3><div class="adesivo-wrap"><img src="adesivo-porta-base.png" id="adesivoBase"><img id="qr2" class="adesivo-qr"></div><button class="btn btn-verde" onclick="baixarAdesivo()">Baixar Adesivo Fiel PNG</button></div>

<div class="card"><h3 style="color:#1e5aa8;margin:0 0 8px 0">4. QR AZUL REDONDO</h3><div style="position:relative;width:300px;height:300px;margin:0 auto"><img src="qr-azul-base.png" style="width:100%"><img id="qr3" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:140px;height:140px;background:#fff;padding:4px;border-radius:4px"></div><button class="btn" style="background:#1e5aa8;color:#fff" onclick="baixarQrAzul()">Baixar QR Azul Fiel PNG</button></div>

<canvas id="cv" style="display:none"></canvas>
<script>
let longUrl="";
function gerar(){
let emp=document.getElementById('empresa').value||'Nome da Empresa';
let num=document.getElementById('numero').value.replace(/\D/g,'');
let msg=document.getElementById('msg').value;
longUrl=`https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
document.getElementById('linkTxt').innerText=longUrl;
document.getElementById('certNome').innerText=emp;
let qr=`https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(longUrl)}`;
let qrAzul=`https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(longUrl)}&color=30-90-168`;
document.getElementById('qr').src=qr;
document.getElementById('qr2').src=qr;
document.getElementById('qr3').src=qrAzul;
}
function copiar(){navigator.clipboard.writeText(longUrl);alert('Copiado!');}
function baixarQR(){window.open(document.getElementById('qr').src,'_blank');}
function baixarQrAzul(){window.open(document.getElementById('qr3').src,'_blank');}
function baixarCert(){
let emp=document.getElementById('empresa').value;
let img=document.getElementById('certBase');
let c=document.getElementById('cv');c.width=1600;c.height=1120;let x=c.getContext('2d');
x.drawImage(img,0,0,c.width,c.height);
x.fillStyle='#6A2FB5';x.font='70px Brush Script MT';x.textAlign='center';
x.fillText(emp,c.width/2,c.height*0.49);
let a=document.createElement('a');a.download='CERTIFICADO-FIEL-'+emp+'.png';a.href=c.toDataURL();a.click();
}
function baixarAdesivo(){
let img=document.getElementById('adesivoBase');
let qr=document.getElementById('qr2');
let c=document.getElementById('cv');c.width=1600;c.height=800;let x=c.getContext('2d');
x.drawImage(img,0,0,c.width,c.height);
x.drawImage(qr,c.width*0.775,c.height*0.26,c.width*0.15,c.height*0.38);
let a=document.createElement('a');a.download='ADESIVO-PORTA-FIEL.png';a.href=c.toDataURL();a.click();
}
gerar();
</script>
</body>
</html>
